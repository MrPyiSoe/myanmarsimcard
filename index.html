<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myanmar Simcard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #050505; 
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 150, 255, 0.15 ) 0%, transparent 60%),
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 100% 100%, 35px 35px, 35px 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Sans Myanmar', sans-serif; 
    }

    /* Shopping Cart (ဈေးခြင်းတောင်း) ဒီဇိုင်း */
    .cart-container {
      position: absolute;
      top: 20px;
      right: 25px;
      cursor: pointer;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .cart-container:hover {
      transform: scale(1.1);
    }

    .cart-icon {
      width: 28px;
      height: 28px;
      stroke: white;
    }

    .cart-badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background-color: #ff4444;
      color: white;
      font-size: 11px;
      font-weight: bold;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    .header-container {
      position: absolute;
      top: 50px; 
      text-align: center; 
      width: 100%; 
    }

    .top-title {
      color: white; 
      font-size: 32px; 
      font-weight: bold; 
      letter-spacing: 2px; 
      margin-bottom: 10px; 
      text-decoration: none; 
      display: block; 
    }

    .sub-title {
      color: #e0e0e0; 
      font-size: 20px; 
      letter-spacing: 1px;
      line-height: 1.5;
    }

    .image-container {
      display: grid;
      grid-template-columns: auto auto; 
      gap: 20px; 
      justify-content: center;
      align-items: center;
      margin-top: 80px; 
    }

    .center-image {
      width: 150px; 
      height: auto;
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0, 150, 255, 0.3); 
      transition: transform 0.3s ease; 
      cursor: pointer; 
    }

    .center-image:hover {
      transform: scale(1.05); 
    }

    @media (min-width: 600px) {
      .center-image {
        width: 220px;
      }
      .image-container {
        gap: 40px;
      }
    }

    /* Delivery Animation Code */
    .delivery-track {
      position: absolute;
      bottom: 30px; 
      width: 90%; 
      max-width: 1200px; 
      height: 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 2px dashed rgba(255, 255, 255, 0.2); 
      padding-bottom: 5px;
    }

    .track-icon {
      text-align: center;
      font-size: 24px;
      z-index: 2;
    }

    .car-container {
      position: absolute;
      bottom: 5px;
      left: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: drive 6s linear infinite; 
      z-index: 1;
    }

    .car-text {
      font-size: 11px;
      color: #0096ff;
      font-weight: bold;
      white-space: nowrap;
      margin-bottom: 2px;
      text-shadow: 0 0 5px rgba(0, 150, 255, 0.5);
    }

    @keyframes drive {
      0% { left: 30px; opacity: 0; }
      10% { opacity: 1; }
      85% { opacity: 1; }
      100% { left: calc(100% - 70px); opacity: 0; }
    }

    /* Popup Box (Modal) အတွက် ဒီဇိုင်း */
    .modal-overlay {
      display: none; 
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111;
      border: 1px solid #333;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0, 150, 255, 0.2);
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 15px; right: 20px;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
      font-weight: bold;
    }

    .close-btn:hover { color: white; }

    .modal-title {
      color: white;
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 22px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .number-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
      padding: 12px 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #222;
    }

    .num-info {
      display: flex;
      flex-direction: column;
    }

    .num-text {
      color: #0096ff;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .price-text {
      color: #e0e0e0;
      font-size: 14px;
      margin-top: 4px;
    }

    .buy-btn {
      background: linear-gradient(45deg, #0096ff, #005bb5);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Noto Sans Myanmar', sans-serif;
    }

    .buy-btn:hover {
      background: linear-gradient(45deg, #005bb5, #003f80);
      box-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
    }

    .remove-btn {
      background: #ff4444;
    }

    .remove-btn:hover {
      background: #cc0000;
      box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
    }

    .cart-total-section {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-text {
      color: white;
      font-size: 16px;
    }

    .total-price {
      color: #0096ff;
      font-size: 20px;
      font-weight: bold;
    }

    .checkout-btn {
      display: block;
      width: 100%;
      text-align: center;
      background: linear-gradient(45deg, #28a745, #1e7e34);
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 15px;
      text-decoration: none;
      transition: 0.3s;
      border: none;
      cursor: pointer;
      font-family: 'Noto Sans Myanmar', sans-serif;
    }

    .checkout-btn:hover {
      background: linear-gradient(45deg, #1e7e34, #145523);
      box-shadow: 0 0 15px rgba(40, 167, 69, 0.5);
    }

    .checkout-btn:disabled {
      background: #555;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Customer Form (အချက်အလက်ဖြည့်ရန်) ဒီဇိုင်း */
    .form-group {
      margin-bottom: 15px;
    }

    .form-label {
      display: block;
      color: #e0e0e0;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .form-input {
      width: 100%;
      box-sizing: border-box;
      background: #1a1a1a;
      border: 1px solid #333;
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans Myanmar', sans-serif;
      outline: none;
      transition: border 0.3s;
    }

    .form-input:focus {
      border-color: #0096ff;
    }

    textarea.form-input {
      resize: none;
    }
  </style>
</head>
<body>

  <!-- Shopping Cart (ဈေးခြင်းတောင်း) Icon -->
  <div class="cart-container" onclick="showCartModal()">
    <svg class="cart-icon" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span class="cart-badge" id="cartBadge">0</span>
  </div>

  <div class="header-container">
    <a href="https://mmbsim.com/" class="top-title">mmbsim.com</a>
    <div class="sub-title">ဖုန်းနံပါတ်အလှရောင်းဝယ်ရေး</div>
  </div>

  <div class="image-container">
    <a href="https://mmbsim.com/mpt/">
      <img src="MPT.png" alt="MPT Simcard" class="center-image">
    </a>
    <a href="https://mmbsim.com/atom-2/">
      <img src="ATOM.png" alt="ATOM Simcard" class="center-image">
    </a>
    
    <a href="#" onclick="showNumbers('ooredoo.json', 'U9', event )">
      <img src="U9.png" alt="U9 Simcard" class="center-image">
    </a>

    <a href="https://mmbsim.com/mytel/">
      <img src="MYTEL.png" alt="Mytel Simcard" class="center-image">
    </a>
  </div>

  <!-- Delivery Animation HTML -->
  <div class="delivery-track">
    <div class="track-icon">🏪</div>
    <div class="car-container">
      <span class="car-text">Cash on Delivery</span>
      <svg width="35" height="22" viewBox="0 0 40 25" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 7 C2 5 4 3 6 3 H25 C26 3 27 4 27 5 V18 H2 V7 Z" fill="#0096FF"/>
        <path d="M27 8 H33 L38 12 V18 H27 V8 Z" fill="#0096FF"/>
        <rect x="29" y="9" width="4" height="3" fill="#050505"/>
        <circle cx="9" cy="19" r="4" fill="#ffffff"/>
        <circle cx="31" cy="19" r="4" fill="#ffffff"/>
      </svg>
    </div>
    <div class="track-icon">🏠</div>
  </div>

  <!-- ဖုန်းနံပါတ်များပြမည့် Popup Box -->
  <div id="numberModal" class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal('numberModal' )">&times;</span>
      <h2 id="modalTitle" class="modal-title">ဖုန်းနံပါတ်များ</h2>
      <div id="numberList"></div>
    </div>
  </div>

  <!-- ဈေးခြင်းတောင်းပြမည့် Popup Box -->
  <div id="cartModal" class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal('cartModal')">&times;</span>
      <h2 class="modal-title">ဈေးခြင်းတောင်း</h2>
      <div id="cartList"></div>
      
      <div class="cart-total-section">
        <span class="total-text">စုစုပေါင်း:</span>
        <span class="total-price" id="cartTotal">0 Ks</span>
      </div>
      
      <button class="checkout-btn" onclick="openCheckoutForm()">ဝယ်ယူမည် (Checkout)</button>
    </div>
  </div>

  <!-- အချက်အလက်ဖြည့်ရန် Popup Box -->
  <div id="checkoutModal" class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal('checkoutModal')">&times;</span>
      <h2 class="modal-title">အချက်အလက်ဖြည့်ပါ</h2>
      
      <div class="form-group">
        <label class="form-label">အမည်</label>
        <input type="text" id="customerName" class="form-input" placeholder="လူကြီးမင်း၏ အမည်">
      </div>
      
      <div class="form-group">
        <label class="form-label">ဆက်သွယ်ရန် ဖုန်းနံပါတ်</label>
        <input type="tel" id="customerPhone" class="form-input" placeholder="09xxxxxxxxx">
      </div>
      
      <div class="form-group">
        <label class="form-label">ပို့ဆောင်ပေးရမည့် လိပ်စာ</label>
        <textarea id="customerAddress" class="form-input" rows="3" placeholder="မြို့၊ မြို့နယ်၊ လမ်း၊ အိမ်အမှတ်"></textarea>
      </div>
      
      <button id="submitOrderBtn" class="checkout-btn" onclick="confirmOrder()">အော်ဒါတင်မည်</button>
    </div>
  </div>

  <!-- JavaScript (စနစ်များ အလုပ်လုပ်ရန်) -->
  <script>
    let cart = []; 

    async function showNumbers(jsonFile, operatorName, event) {
      event.preventDefault(); 
      
      const modal = document.getElementById('numberModal');
      const modalTitle = document.getElementById('modalTitle');
      const numberList = document.getElementById('numberList');

      modalTitle.innerText = operatorName + " ဖုန်းနံပါတ်များ";
      numberList.innerHTML = '<p style="color: #aaa; text-align: center;">ခဏစောင့်ပါ...</p>';
      modal.style.display = 'flex'; 

      try {
        const response = await fetch(jsonFile);
        const data = await response.json();
        
        numberList.innerHTML = ''; 
        
        if(data.length === 0) {
           numberList.innerHTML = '<p style="color: #aaa; text-align: center;">နံပါတ်များ မရှိသေးပါ</p>';
           return;
        }

        data.forEach(item => {
          const row = document.createElement('div');
          row.className = 'number-row';
          
          row.innerHTML = `
            <div class="num-info">
              <span class="num-text">${item.number}</span>
              <span class="price-text">${item.price}</span>
            </div>
            <button onclick="addToCart('${item.number}', '${item.price}')" class="buy-btn">Buy</button>
          `;
          numberList.appendChild(row);
        });
      } catch (error) {
        numberList.innerHTML = '<p style="color: #ff4444; text-align: center;">ဒေတာ ယူရာတွင် အမှားအယွင်းဖြစ်နေပါသည်</p>';
      }
    }

    function addToCart(number, price) {
      cart.push({ number, price });
      document.getElementById('cartBadge').innerText = cart.length;
      alert(number + " ကို ခြင်းတောင်းထဲ ထည့်လိုက်ပါပြီ။");
    }

    function showCartModal() {
      const modal = document.getElementById('cartModal');
      const cartList = document.getElementById('cartList');
      const cartTotal = document.getElementById('cartTotal');
      
      cartList.innerHTML = '';
      let totalAmount = 0;

      if (cart.length === 0) {
        cartList.innerHTML = '<p style="color: #aaa; text-align: center;">ခြင်းတောင်းထဲတွင် ပစ္စည်းမရှိသေးပါ</p>';
        cartTotal.innerText = '0 Ks';
      } else {
        cart.forEach((item, index) => {
          let priceNum = parseInt(item.price.replace(/,/g, '').replace(' Ks', ''));
          if(!isNaN(priceNum)) totalAmount += priceNum;

          const row = document.createElement('div');
          row.className = 'number-row';
          row.innerHTML = `
            <div class="num-info">
              <span class="num-text">${item.number}</span>
              <span class="price-text">${item.price}</span>
            </div>
            <button onclick="removeFromCart(${index})" class="buy-btn remove-btn">ဖျက်မည်</button>
          `;
          cartList.appendChild(row);
        });
        cartTotal.innerText = totalAmount.toLocaleString() + ' Ks';
      }
      
      modal.style.display = 'flex';
    }

    function removeFromCart(index) {
      cart.splice(index, 1); 
      document.getElementById('cartBadge').innerText = cart.length;
      showCartModal(); 
    }

    function openCheckoutForm() {
      if (cart.length === 0) {
        alert("ခြင်းတောင်းထဲတွင် ပစ္စည်းမရှိသေးပါ။");
        return;
      }
      closeModal('cartModal'); 
      document.getElementById('checkoutModal').style.display = 'flex'; 
    }

    // ==========================================
    // Telegram သို့ တိုက်ရိုက်ပို့မည့် စနစ် (API)
    // ==========================================
    function confirmOrder() {
      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('customerPhone').value.trim();
      const address = document.getElementById('customerAddress').value.trim();

      if (!name || !phone || !address) {
        alert("ကျေးဇူးပြု၍ အမည်၊ ဖုန်းနံပါတ် နှင့် လိပ်စာကို ပြည့်စုံစွာ ဖြည့်ပေးပါ။");
        return;
      }

      // ၁။ အောက်ပါ နေရာနှစ်ခုတွင် အစ်ကို့ရဲ့ Bot Token နှင့် Chat ID ကို ထည့်ပါ
      const botToken = 'YOUR_BOT_TOKEN'; 
      const chatId = 'YOUR_CHAT_ID';     

      let message = "📦 အော်ဒါအသစ် ရောက်ရှိပါသည်\n\n";
      cart.forEach(item => {
        message += `✅ ${item.number} (${item.price})\n`;
      });
      
      let total = document.getElementById('cartTotal').innerText;
      message += `\n💰 စုစုပေါင်း - ${total}\n\n`;
      message += `👤 အမည်: ${name}\n`;
      message += `📞 ဖုန်း: ${phone}\n`;
      message += `🏠 လိပ်စာ: ${address}`;

      const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
      
      // ခလုတ်ကို "ပို့ဆောင်နေပါသည်..." ဟု ပြောင်းမည်
      const btn = document.getElementById('submitOrderBtn' );
      btn.innerText = 'ပို့ဆောင်နေပါသည်...';
      btn.disabled = true;

      // Telegram သို့ နောက်ကွယ်မှ လှမ်းပို့ခြင်း
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: chatId,
          text: message
        })
      })
      .then(response => response.json())
      .then(data => {
        if(data.ok) {
          alert("အော်ဒါတင်ခြင်း အောင်မြင်ပါသည်။ မကြာမီ ဆက်သွယ်ပေးပါမည်။");
          closeModal('checkoutModal');
          cart = [];
          document.getElementById('cartBadge').innerText = '0';
          document.getElementById('customerName').value = '';
          document.getElementById('customerPhone').value = '';
          document.getElementById('customerAddress').value = '';
        } else {
          alert("အော်ဒါတင်ရာတွင် အမှားအယွင်းဖြစ်နေပါသည်။ (Token နှင့် Chat ID ကို စစ်ဆေးပါ)");
        }
      })
      .catch(error => {
        alert("အင်တာနက် ချိတ်ဆက်မှု စစ်ဆေးပေးပါ။");
      })
      .finally(() => {
        // ခလုတ်ကို မူလအတိုင်း ပြန်ထားမည်
        btn.innerText = 'အော်ဒါတင်မည်';
        btn.disabled = false;
      });
    }

    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    window.onclick = function(event) {
      const numberModal = document.getElementById('numberModal');
      const cartModal = document.getElementById('cartModal');
      const checkoutModal = document.getElementById('checkoutModal');
      if (event.target == numberModal) numberModal.style.display = "none";
      if (event.target == cartModal) cartModal.style.display = "none";
      if (event.target == checkoutModal) checkoutModal.style.display = "none";
    }
  </script>

</body>
</html>
