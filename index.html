<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myanmar Simcard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #050505; 
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 150, 255, 0.15 ) 0%, transparent 60%),
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 100% 100%, 35px 35px, 35px 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Sans Myanmar', sans-serif; 
    }

    .header-container {
      position: absolute;
      top: 50px; 
      text-align: center; 
      width: 100%; 
    }

    .top-title {
      color: white; 
      font-size: 32px; 
      font-weight: bold; 
      letter-spacing: 2px; 
      margin-bottom: 10px; 
      text-decoration: none; 
      display: block; 
    }

    .sub-title {
      color: #e0e0e0; 
      font-size: 20px; 
      letter-spacing: 1px;
      line-height: 1.5;
    }

    /* ပုံ ၄ ပုံကို အပေါ် ၂ ပုံ၊ အောက် ၂ ပုံ (2x2) ပေါ်စေရန် ပြင်ဆင်ထားသည် */
    .image-container {
      display: grid;
      grid-template-columns: auto auto; /* ၂ ကော်လံခွဲမည် */
      gap: 20px; /* ပုံများကြား အကွာအဝေး */
      justify-content: center;
      align-items: center;
      margin-top: 80px; 
    }

    /* ပုံဒီဇိုင်း */
    .center-image {
      width: 150px; /* ဖုန်းတွင် ၄ ပုံစလုံး အချိုးကျပေါ်ရန် အရွယ်အစား အနည်းငယ် ချိန်ထားသည် */
      height: auto;
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0, 150, 255, 0.3); 
      transition: transform 0.3s ease; 
    }

    .center-image:hover {
      transform: scale(1.05); 
    }

    /* ကွန်ပျူတာ/Tablet များအတွက် ပုံအရွယ်အစား ပိုကြီးရန် */
    @media (min-width: 600px) {
      .center-image {
        width: 220px;
      }
      .image-container {
        gap: 40px;
      }
    }
  </style>
</head>
<body>

  <div class="header-container">
    <a href="https://mmbsim.com/" class="top-title">mmbsim.com</a>
    <div class="sub-title">ဖုန်းနံပါတ်အလှရောင်းဝယ်ရေး</div>
  </div>

  <!-- ပုံ ၄ ပုံ စုထားသည့် နေရာ -->
  <div class="image-container">
    
    <!-- MPT ပုံနှင့် လင့်ခ် -->
    <a href="https://mmbsim.com/mpt/">
      <img src="MPT.png" alt="MPT Simcard" class="center-image">
    </a>

    <!-- ATOM ပုံနှင့် လင့်ခ် -->
    <a href="https://mmbsim.com/atom-2/">
      <img src="ATOM.png" alt="ATOM Simcard" class="center-image">
    </a>

    <!-- Ooredoo ပုံနှင့် လင့်ခ် (အသစ် ) -->
    <a href="https://mmbsim.com/ooredoo/">
      <img src="U9.png" alt="Ooredoo Simcard" class="center-image">
    </a>

    <!-- Mytel ပုံနှင့် လင့်ခ် (အသစ် ) -->
    <a href="https://mmbsim.com/mytel/">
      <img src="MYTEL.png" alt="Mytel Simcard" class="center-image">
    </a>

  </div>

</body>
</html>
