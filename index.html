<!DOCTYPE html>
<html>
<head>
  <title>Myanmar Simcard</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #050505; 
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 150, 255, 0.15) 0%, transparent 60%),
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 100% 100%, 35px 35px, 35px 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Pyidaungsu', 'Myanmar Text', Arial, sans-serif; /* မြန်မာစာအတွက် ဖောင့် */
    }

    /* အပေါ်ဆုံးက စာသားများစုထားမည့် နေရာ */
    .header-container {
      position: absolute;
      top: 50px; /* အပေါ်ဘက်မှ အကွာအဝေး */
      text-align: center; /* စာသားများကို အလယ်တည့်တည့်ထားရန် */
    }

    /* mmbsim.com စာသား ဒီဇိုင်း */
    .top-title {
      color: white; 
      font-size: 36px; 
      font-weight: bold; 
      letter-spacing: 2px; 
      margin-bottom: 10px; /* အောက်က မြန်မာစာနှင့် အကွာအဝေး */
    }

    /* မြန်မာစာသား ဒီဇိုင်း */
    .sub-title {
      color: #e0e0e0; /* ငွေမှင်ရောင် (အဖြူထက် အနည်းငယ်မှိန်သည်) */
      font-size: 22px; /* စာလုံးအရွယ်အစား */
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- အပေါ်ဆုံးက စာသားများ -->
  <div class="header-container">
    <div class="top-title">mmbsim.com</div>
    <div class="sub-title">ဖုန်းနံပါတ်အလှရောင်းဝယ်ရေး</div>
  </div>

</body>
</html>
