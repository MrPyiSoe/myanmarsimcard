<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myanmar Simcard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #050505; 
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 150, 255, 0.15  ) 0%, transparent 60%),
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 100% 100%, 35px 35px, 35px 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Sans Myanmar', sans-serif; 
    }

    .header-container {
      position: absolute;
      top: 50px; 
      text-align: center; 
      width: 100%; 
    }

    .top-title {
      color: white; 
      font-size: 32px; 
      font-weight: bold; 
      letter-spacing: 2px; 
      margin-bottom: 10px; 
      text-decoration: none; 
      display: block; 
    }

    .sub-title {
      color: #e0e0e0; 
      font-size: 20px; 
      letter-spacing: 1px;
      line-height: 1.5;
    }

    /* အလယ်က ပုံအတွက် ဒီဇိုင်း (အသစ်ထပ်တိုးထားသည်) */
    .center-image {
      width: 280px; 
      height: auto;
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0, 150, 255, 0.3); 
      transition: transform 0.3s ease; 
    }

    .center-image:hover {
      transform: scale(1.05); 
    }
  </style>
</head>
<body>

  <div class="header-container">
    <a href="https://mmbsim.com/" class="top-title">mmbsim.com</a>
    <div class="sub-title">ဖုန်းနံပါတ်အလှရောင်းဝယ်ရေး</div>
  </div>

  <!-- အလယ်က ပုံနှင့် MPT လင့်ခ် (အသစ်ထပ်တိုးထားသည် ) -->
  <a href="https://mmbsim.com/mpt/">
    <img src="https://via.placeholder.com/300x300?text=MPT+Image" alt="MPT Simcard" class="center-image">
  </a>

</body>
</html>
