    let cart = []; 
    
    // 🌟 အော်ပရေတာ အားလုံးရဲ့ ဒေတာတွေကို စုသိမ်းထားမည့် Global Array
    let allNumbersData = []; 

    // 🌟 ၁။ ဝက်ဘ်ဆိုက် စပွင့်တာနဲ့ JSON ၄ ခုလုံးကို နောက်ကွယ်ကနေ ကြိုဆွဲထားမည့် Function
    async function preloadAllNumbers() {
        const operators = [
            { file: 'mpt.json', name: 'MPT' },
            { file: 'atom.json', name: 'ATOM' },
            { file: 'ooredoo.json', name: 'U9' },
            { file: 'mytel.json', name: 'MYTEL' }
        ];

        try {
            // JSON အားလုံးကို တစ်ပြိုင်နက်တည်း ဆွဲယူရန် Promise.all သုံးထားပါသည်
            const fetchPromises = operators.map(async (op) => {
                try {
                    const response = await fetch(op.file + '?t=' + new Date().getTime());
                    const data = await response.json();
                    
                    // ဒေတာတစ်ခုချင်းစီမှာ ဘယ် Operator လဲဆိုတာကို ခွဲခြားရလွယ်အောင် မှတ်ပေးထားသည်
                    return data.map(item => ({ ...item, operator: op.name }));
                } catch (e) {
                    console.error(`${op.name} ဒေတာဆွဲရတာ အဆင်မပြေပါ - `, e);
                    return [];
                }
            });

            const results = await Promise.all(fetchPromises);
            // ရလာတဲ့ JSON ၄ ခုလုံးကို Array တစ်ခုတည်းဖြစ်အောင် ပေါင်းထည့်လိုက်ခြင်း
            allNumbersData = results.flat();

            // နံပါတ်များကို ငယ်ရာမှ ကြီးရာသို့ ကြိုတင် Sort လုပ်ထားခြင်း
            allNumbersData.sort((a, b) => {
                let numA = a.number.replace(/\D/g, '');
                let numB = b.number.replace(/\D/g, '');
                return numA.localeCompare(numB);
            });

            console.log("အော်ပရေတာ အားလုံးရဲ့ နံပါတ်ဒေတာများ ကြိုတင်ရယူပြီးပါပြီ။");
        } catch (error) {
            console.error("ဒေတာ ကြိုတင်ယူရာတွင် အမှားအယွင်းရှိပါသည် - ", error);
        }
    }

    // ဝက်ဘ်ဆိုက် ပွင့်တာနဲ့ အထက်က ပေါင်းဆွဲတဲ့ Function ကို တန်းပတ်ပေးခြင်း
    window.addEventListener('DOMContentLoaded', preloadAllNumbers);


    // 🌟 လက်ရှိဖွင့်ထားသော Operator အမျိုးအစားကို မှတ်ထားရန် Variable အသစ်
    let currentActiveOperator = "ALL"; 

    // 🌟 ၂။ Operator လိုဂိုတစ်ခုချင်းစီကို နှိပ်တဲ့အခါ ပြသပေးမည့် လုပ်ဆောင်ချက်
    function showNumbers(jsonFile, operatorName, event) {
        if(event) event.preventDefault(); 
        
        const modal = document.getElementById('numberModal');
        const modalTitle = document.getElementById('modalTitle');
        
        // လက်ရှိနှိပ်လိုက်တဲ့ Operator နာမည်ကို မှတ်သားထားခြင်း
        currentActiveOperator = operatorName; 
        
        modalTitle.innerText = operatorName + " ဖုန်းနံပါတ်များ";
        modal.style.display = 'flex'; 

        // မိမိနှိပ်လိုက်တဲ့ Operator ဒေတာတစ်ခုတည်းကိုပဲ စစ်ထုတ်ပြသခြင်း
        const operatorSpecificData = allNumbersData.filter(item => item.operator === operatorName);
        renderNumbers(operatorSpecificData);
    }


    // 🌟 ၃။ နံပါတ်များကို UI တွင် HTML Row အဖြစ် ပြသပေးမည့် Function
    function renderNumbers(dataList) {
        const numberList = document.getElementById('numberList');
        numberList.innerHTML = ''; 
        
        if(dataList.length === 0) {
           numberList.innerHTML = '<p style="color: #aaa; text-align: center;">နံပါတ်များ မရှိသေးပါ</p>';
           return;
        }

        dataList.forEach(item => {
            const isAlreadyInCart = cart.some(cartItem => cartItem.number === item.number);
            const row = document.createElement('div');
            row.className = 'number-row';
            
            // အပြင်ကနေ ရှာဖွေတာ (ALL) ဆိုလျှင်သာ Operator Badge လေးကို ပြသမည်
            const opBadge = currentActiveOperator === "ALL" 
                ? `<span style="font-size: 11px; background: #222; color: #aaa; padding: 2px 6px; border-radius: 4px; margin-left: 8px;">${item.operator}</span>` 
                : "";

            if (isAlreadyInCart) {
                row.innerHTML = `
                    <div class="num-info">
                        <span class="num-text">${item.number} ${opBadge}</span>
                        <span class="price-text">${item.price}</span>
                    </div>
                    <button class="buy-btn" style="background: #555; cursor: not-allowed; box-shadow: none;" disabled>ရွေးပြီး</button>
                `;
            } else {
                row.innerHTML = `
                    <div class="num-info">
                        <span class="num-text">${item.number} ${opBadge}</span>
                        <span class="price-text">${item.price}</span>
                    </div>
                    <button onclick="addToCart('${item.number}', '${item.price}', this)" class="buy-btn">Buy</button>
                `;
            }
            numberList.appendChild(row);
        });
    }


    // 🌟 ၄။ Search Box စနစ် (အပြင်ကရှာလျှင် အားလုံးထဲကရှာပြီး၊ အထဲကရှာလျှင် သက်ဆိုင်ရာလိုင်းထဲကပဲ ရှာမည်)
    let searchTimeout;

    function performSearch(targetValue, isFromInsideModal = false) {
        const searchText = targetValue.replace(/[\s\-]/g, '').toLowerCase();

        // စာသားတွေ ပြန်ဖျက်လိုက်လို့ ကွက်လပ်ဖြစ်သွားလျှင်
        if(searchText === "") {
            clearTimeout(searchTimeout);
            const modalTitle = document.getElementById('modalTitle');
            
            if (isFromInsideModal) {
                // Modal ထဲကနေ ဖျက်တာဆိုရင် အဲဒီလိုင်းရဲ့ နံပါတ်အားလုံးကို ပြန်ပြမယ်
                modalTitle.innerText = currentActiveOperator + " ဖုန်းနံပါတ်များ";
                const originalOperatorData = allNumbersData.filter(item => item.operator === currentActiveOperator);
                renderNumbers(originalOperatorData);
            } else {
                // အပြင်ကနေ ဖျက်တာဆိုရင် Modal ကိုပါ ပိတ်ပစ်မယ် (သို့မဟုတ် အားလုံးပြန်ပြမယ်)
                closeModal('numberModal');
            }
            return;
        }

        clearTimeout(searchTimeout);
        
        searchTimeout = setTimeout(() => {
            const modal = document.getElementById('numberModal');
            const modalTitle = document.getElementById('modalTitle');
            
            modal.style.display = 'flex'; 

            // Input Box (၂) ခုလုံးမှာ စာသားတွေ တူညီနေအောင် ထိန်းညှိခြင်း
            document.getElementById('searchInput').value = targetValue;
            document.getElementById('modalSearchInput').value = targetValue;

            if (isFromInsideModal) {
                // 💡 ကွဲပြားသွားသည့်အချက်- Modal ထဲက ရှာဖွေမှုဆိုလျှင် လက်ရှိ Operator တစ်ခုတည်းထဲကပဲ ရှာမည်
                modalTitle.innerText = `${currentActiveOperator} ထဲမှ ရှာဖွေတွေ့ရှိချက်`;
                const filteredData = allNumbersData.filter(item => {
                    const cleanNumber = item.number.replace(/[\s\-]/g, '').toLowerCase();
                    return item.operator === currentActiveOperator && cleanNumber.includes(searchText);
                });
                renderNumbers(filteredData);
            } else {
                // 💡 အပြင်က ရှာဖွေမှုဆိုလျှင် Operator အားလုံး (ALL) ထဲကနေ လိုက်ရှာမည်
                currentActiveOperator = "ALL"; 
                modalTitle.innerText = "ရှာဖွေတွေ့ရှိသော ဖုန်းနံပါတ်များ";
                const filteredData = allNumbersData.filter(item => {
                    const cleanNumber = item.number.replace(/[\s\-]/g, '').toLowerCase();
                    return cleanNumber.includes(searchText);
                });
                renderNumbers(filteredData);
            }
        }, 300);
    }

    // ပင်မစာမျက်နှာက အပြင် Search Box အတွက် (isFromInsideModal = false)
    document.getElementById('searchInput').addEventListener('input', function(e) {
        performSearch(e.target.value, false);
    });

    // Modal ထဲက ခေါင်းစဉ်နားက Search Box အသစ်အတွက် (isFromInsideModal = true)
    document.getElementById('modalSearchInput').addEventListener('input', function(e) {
        performSearch(e.target.value, true);
    });

    // 🌟 မူလ closeModal Function ထဲတွင် Modal ပိတ်လျှင် Box (၂) ခုလုံးကို ရှင်းပစ်ရန် ဖြည့်စွက်ခြင်း
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
        if(modalId === 'numberModal') {
            document.getElementById('searchInput').value = '';
            document.getElementById('modalSearchInput').value = ''; // Modal ထဲက ကွက်လပ်ပါ ရှင်းပစ်ခြင်း
        }
    }


    // --- အောက်က Code များသည် အစ်ကို့ရဲ့ မူလ ခြင်းတောင်း Logic များအတိုင်း ဖြစ်ပါသည် ---
    function addToCart(number, price, btnElement) {
        const isAlreadyInCart = cart.some(item => item.number === number);
        if (isAlreadyInCart) {
            alert("ဒီနံပါတ်ကို ခြင်းတောင်းထဲ ထည့်ပြီးသားပါ။");
            return;
        }

        cart.push({ number, price });
        document.getElementById('cartBadge').innerText = cart.length;
        
        if (btnElement) {
            btnElement.innerText = "ရွေးပြီး";
            btnElement.style.background = "#555";
            btnElement.style.cursor = "not-allowed";
            btnElement.style.boxShadow = "none";
            btnElement.disabled = true;
        }
    }

    function showCartModal() {
        const modal = document.getElementById('cartModal');
        const cartList = document.getElementById('cartList');
        const cartTotal = document.getElementById('cartTotal');
        
        cartList.innerHTML = '';
        let totalAmount = 0;

        if (cart.length === 0) {
            cartList.innerHTML = '<p style="color: #aaa; text-align: center;">ခြင်းတောင်းထဲတွင် ပစ္စည်းမရှိသေးပါ</p>';
            cartTotal.innerText = '0 Ks';
        } else {
            cart.forEach((item, index) => {
                let priceNum = parseInt(item.price.replace(/,/g, '').replace(' Ks', ''));
                if(!isNaN(priceNum)) totalAmount += priceNum;

                const row = document.createElement('div');
                row.className = 'number-row';
                row.innerHTML = `
                    <div class="num-info">
                        <span class="num-text">${item.number}</span>
                        <span class="price-text">${item.price}</span>
                    </div>
                    <button onclick="removeFromCart(${index})" class="buy-btn remove-btn">ဖျက်မည်</button>
                `;
                cartList.appendChild(row);
            });
            cartTotal.innerText = totalAmount.toLocaleString() + ' Ks';
        }
        modal.style.display = 'flex';
    }

    function removeFromCart(index) {
        cart.splice(index, 1); 
        document.getElementById('cartBadge').innerText = cart.length;
        showCartModal(); 
    }

    function openCheckoutForm() {
        if (cart.length === 0) {
            alert("ခြင်းတောင်းထဲတွင် ပစ္စည်းမရှိသေးပါ။");
            return;
        }
        closeModal('cartModal'); 
        document.getElementById('checkoutModal').style.display = 'flex'; 
    }

    async function confirmOrder() {
        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        const address = document.getElementById('customerAddress').value.trim();

        if (!name || !phone || !address) {
            alert("ကျေးဇူးပြု၍ အမည်၊ ဖုန်းနံပါတ် နှင့် လိပ်စာကို ပြည့်စုံစွာ ဖြည့်ပေးပါ။");
            return;
        }

        const btn = document.getElementById('submitOrderBtn');
        btn.innerText = 'ပို့ဆောင်နေပါသည်...';
        btn.disabled = true;

        const total = document.getElementById('cartTotal').innerText;

        try {
            const response = await fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, address, cart, total })
            });

            const data = await response.json();

            if (response.ok) {
                alert("အော်ဒါတင်ခြင်း အောင်မြင်ပါသည်။ မကြာမီ ဆက်သွယ်ပေးပါမည်။");
                closeModal('checkoutModal');
                cart = [];
                document.getElementById('cartBadge').innerText = '0';
                document.getElementById('customerName').value = '';
                document.getElementById('customerPhone').value = '';
                document.getElementById('customerAddress').value = '';
            } else {
                alert("အော်ဒါတင်ရာတွင် အမှားအယွင်းဖြစ်နေပါသည်။");
                console.error(data.error);
            }
        } catch (error) {
            alert("အင်တာနက် ချက်ဆက်မှု စစ်ဆေးပေးပါ။");
            console.error(error);
        } finally {
            btn.innerText = 'အော်ဒါတင်မည်';
            btn.disabled = false;
        }
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
        // Modal ပိတ်လိုက်ရင် Search Box ထဲက စာသားကိုပါ Clear လုပ်ပေးရန်
        if(modalId === 'numberModal') {
            document.getElementById('searchInput').value = '';
        }
    }

    window.onclick = function(event) {
        const numberModal = document.getElementById('numberModal');
        const cartModal = document.getElementById('cartModal');
        const checkoutModal = document.getElementById('checkoutModal');
        if (event.target == numberModal) closeModal('numberModal');
        if (event.target == cartModal) cartModal.style.display = "none";
        if (event.target == checkoutModal) checkoutModal.style.display = "none";
    }
</script>

</body>
