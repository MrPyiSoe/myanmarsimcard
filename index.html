<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8"> <!-- မြန်မာစာ မှန်ကန်စေရန် -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ဖုန်းနှင့်ကြည့်လျှင် အချိုးအစားမှန်စေရန် -->
  <title>Myanmar Simcard</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #050505; 
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 150, 255, 0.15) 0%, transparent 60%),
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 100% 100%, 35px 35px, 35px 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Pyidaungsu', 'Padauk', 'Myanmar Text', sans-serif; /* မြန်မာစာ ဖောင့်များ */
    }

    .header-container {
      position: absolute;
      top: 50px; 
      text-align: center; 
      width: 100%; /* ဖုန်းတွင် အလယ်တည့်တည့်ဖြစ်စေရန် */
    }

    .top-title {
      color: white; 
      font-size: 32px; /* ဖုန်းနှင့်အဆင်ပြေစေရန် အနည်းငယ် ပြင်ထားသည် */
      font-weight: bold; 
      letter-spacing: 2px; 
      margin-bottom: 10px; 
    }

    .sub-title {
      color: #e0e0e0; 
      font-size: 20px; 
      letter-spacing: 1px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="top-title">mmbsim.com</div>
    <div class="sub-title">ဖုန်းနံပါတ်အလှရောင်းဝယ်ရေး</div>
  </div>

</body>
</html>
